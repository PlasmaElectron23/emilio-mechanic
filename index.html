<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emilio's Garage | Professional Auto Repair</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="lang-bar">
    <button class="lang-btn active" data-lang="es" onclick="setLang('es')">
      <img src="https://flagcdn.com/w20/es.png" width="20" alt="ES"> ES
    </button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">
      <img src="https://flagcdn.com/w20/us.png" width="20" alt="US"> EN
    </button>
    <button class="lang-btn" data-lang="pt" onclick="setLang('pt')">
      <img src="https://flagcdn.com/w20/br.png" width="20" alt="BR"> PT
    </button>
    <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">
      <img src="https://flagcdn.com/w20/fr.png" width="20" alt="FR"> FR
    </button>
  </div>

  <nav>
    <span class="nav-logo">Emilio's <span>Garage</span></span>
    <ul class="nav-links">
      <li><a href="#services" data-i18n="nav_services">Servicios</a></li>
      <li><a href="#info" data-i18n="nav_hours">Horario</a></li>
      <li><a href="#info" class="nav-cta" data-i18n="nav_contact">Contáctanos</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-container">
      <div class="hero-content">
        <h1 class="hero-title" data-i18n="hero_title">Tu auto, en <span>manos de confianza.</span></h1>
        <p class="hero-sub" data-i18n="hero_sub">Emilio's Garage ofrece reparaciones de calidad con diagnósticos honestos.</p>
        <div class="hero-actions">
          <a href="#info" class="nav-cta" style="text-decoration:none;" data-i18n="hero_cta1">Contáctanos</a>
        </div>
      </div>

      <div class="hero-stats">
        <div class="stat-card">
          <div class="stat-number">20+</div>
          <div class="stat-label" data-i18n="stat1">Años de experiencia</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">5★</div>
          <div class="stat-label" data-i18n="stat3">Calificación</div>
        </div>
      </div>
    </div>
  </section>

  <footer id="info">
    <p>© 2026 <strong>Emilio's Garage</strong> · <span data-i18n="footer_licensed">Licenciado y Asegurado</span></p>
  </footer>

  <script src="js/translations.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
